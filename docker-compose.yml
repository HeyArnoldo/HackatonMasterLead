# Desarrollo local: solo la base de datos.
# Adminer (UI web para la DB) es opcional: docker compose --profile tools up -d
services:
  db:
    # pgvector/pgvector:pg16 = Postgres 16 con la extensión pgvector preinstalada
    # (necesaria para la columna embedding vector(1536) de desempeno).
    image: pgvector/pgvector:pg16
    container_name: yachai-db
    environment:
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-app}
      POSTGRES_DB: ${DB_NAME:-yachai}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-app} -d ${DB_NAME:-yachai}']
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    profiles: ['tools']
    ports:
      - '${ADMINER_PORT:-8081}:8080'
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
